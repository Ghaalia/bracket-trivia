function shade(hex, amt) {
  const n = parseInt(hex.replace('#', ''), 16);
  let r = (n >> 16) + amt;
  let g = ((n >> 8) & 0xff) + amt;
  let b = (n & 0xff) + amt;
  r = Math.max(0, Math.min(255, r));
  g = Math.max(0, Math.min(255, g));
  b = Math.max(0, Math.min(255, b));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}

const OTDB_CAT = {

  landmarks: 22, // Geography (closest match)

  music:     12, // Entertainment: Music

// Decode HTML entities in OTDB response strings
function decodeHTML(s) {
  const t = document.createElement('textarea');
  t.innerHTML = s;
  return t.value;
}

// Shuffle in place
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Fetch English questions from Open Trivia DB and normalize to our schema
async function fetchEnglish(category, difficulty, count) {
  const params = new URLSearchParams({
    amount: String(count),
    difficulty: OTDB_DIFF[difficulty] || 'medium',
  });
  if (category && OTDB_CAT[category]) params.set('category', String(OTDB_CAT[category]));
  const url = `https://opentdb.com/api.php?${params.toString()}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('OTDB fetch failed: ' + res.status);
  const data = await res.json();
  if (data.response_code !== 0 || !Array.isArray(data.results)) {
    throw new Error('OTDB returned no results (code ' + data.response_code + ')');
  }
  return data.results.map(r => {
    if (r.type === 'boolean') {
      // 0 = True, 1 = False (matches existing schema)
      return { type: 'tf', q: decodeHTML(r.question), a: r.correct_answer === 'True' ? 0 : 1 };
    }
    const correct = decodeHTML(r.correct_answer);
    const opts = shuffle([correct, ...r.incorrect_answers.map(decodeHTML)]);
    return { type: 'mc', q: decodeHTML(r.question), opts, a: opts.indexOf(correct) };
  });
}

// Fetch Arabic question bank (cached after first load)
let _arBank = null;
async function loadArabicBank() {
  if (_arBank) return _arBank;
  const res = await fetch('/questions_ar.json');
  if (!res.ok) throw new Error('Arabic bank fetch failed: ' + res.status);
  _arBank = await res.json();
  return _arBank;
}

async function fetchArabic(category, difficulty, count) {
  const bank = await loadArabicBank();
  const pool = [];
  if (category) {
    pool.push(...(bank[category]?.[difficulty] || []));
  } else {
    Object.keys(bank).forEach(cat => {
      pool.push(...(bank[cat][difficulty] || []).map(q => ({ ...q, _cat: cat })));
    });
  }
  return shuffle(pool).slice(0, count);
}

const LangCtx = React.createContext({ L: STRINGS.en, lang: 'en' });
const useLang = () => React.useContext(LangCtx);

// ───────────────────────── Persistent local state ─────────────────────────
const STORAGE_KEY = 'bracket.v1';
function loadStore() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch { return {}; }
}
function saveStore(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function useStore() {
  const [store, setStore] = useState(() => {
    const s = loadStore();
    return {
      streak: s.streak ?? 12,
      lastPlayed: s.lastPlayed ?? null,
      wins: s.wins ?? 38,
      played: s.played ?? 60,
      correctTotal: s.correctTotal ?? 80,
      totalAnswered: s.totalAnswered ?? 108,
      bestScore: s.bestScore ?? 4380,
      mastery: s.mastery ?? { movies: 78, landmarks: 64, music: 51, history: 32, sports: 18, science: 22 },
      darkMode: s.darkMode ?? true,
      notifications: s.notifications ?? false,
      lang: s.lang ?? 'en',
    };
  });
  const update = useCallback((patch) => {
    setStore(prev => {
      const next = typeof patch === 'function' ? patch(prev) : { ...prev, ...patch };
      saveStore(next);
      return next;
    });
  }, []);
  return [store, update];
}

function Brace({ size = 18, color, side = 'left' }) {
  return (
    <span style={{
      fontFamily: MONO, fontWeight: 700, fontSize: size, color,
      lineHeight: 1, display: 'inline-block',
    }}>{side === 'left' ? '{' : '}'}</span>

}

function Logo({ t, size = 22 }) {
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
      <Brace size={size} color={t.accent} side="left" />
      <span style={{
        fontFamily: SANS, fontWeight: 700, fontSize: size, letterSpacing: '0.02em',
        color: t.text,
      }}>BRACKET</span>
      <Brace size={size} color={t.accent} side="right" />
    </div>
  );
}

function Pill({ t, children, tone = 'default', style = {} }) {
  const map = {
    default: { bg: t.surface, color: t.textDim, border: t.border },
    accent:  { bg: t.accentSoft, color: t.accent, border: 'transparent' },
    success: { bg: 'rgba(74,222,128,0.14)', color: t.success, border: 'transparent' },
    warn:    { bg: 'rgba(255,180,84,0.14)', color: t.warn, border: 'transparent' },
    danger:  { bg: 'rgba(255,107,107,0.14)', color: t.danger, border: 'transparent' },
  };
  const c = map[tone];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: '4px 10px', borderRadius: 100,
      background: c.bg, color: c.color, border: `1px solid ${c.border}`,
      fontFamily: MONO, fontSize: 11, fontWeight: 600, letterSpacing: '0.04em',
      textTransform: 'uppercase',
      ...style,
    }}>{children}</span>
  );
}

function PrimaryBtn({ t, children, full = true, onClick, icon, disabled }) {
  return (
    <button onClick={disabled ? undefined : onClick} disabled={disabled} style={{
      width: full ? '100%' : 'auto',
      padding: '16px 22px', borderRadius: 18,
      background: disabled
        ? t.surface
        : `linear-gradient(180deg, ${t.accent} 0%, ${shade(t.accent, -10)} 100%)`,
      color: disabled ? t.textMute : '#fff',
      border: disabled ? `1px solid ${t.border}` : 0,
      cursor: disabled ? 'not-allowed' : 'pointer',
      fontFamily: SANS, fontWeight: 600, fontSize: 16, letterSpacing: '0.01em',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 10,
      boxShadow: disabled ? 'none' : t.accentGlow,
      transition: 'transform 120ms ease',
    }}
    onMouseDown={e => !disabled && (e.currentTarget.style.transform = 'scale(0.98)')}
    onMouseUp={e => (e.currentTarget.style.transform = 'scale(1)')}
    onMouseLeave={e => (e.currentTarget.style.transform = 'scale(1)')}>
      {children}
      {icon}
    </button>
  );
}

function GhostBtn({ t, children, full = false, onClick }) {

function ScreenAuthEmail({ t, dark, mode, onBack, onSubmit }) {
  const { L, lang } = useLang();
  const isSignup = mode === 'signup';
  const arrow = lang === 'ar' ? '←' : '→';
  const [name, setName]   = useState('');
  const [email, setEmail] = useState('');
  const [pwd, setPwd]     = useState('');
  const [err, setErr]     = useState(null);

  const submit = () => {
    if (isSignup && !name.trim()) return setErr({ field: 'name', msg: L.errName });
    if (!email.includes('@'))     return setErr({ field: 'email', msg: L.errEmail });
    if (pwd.length < 6)           return setErr({ field: 'pwd', msg: L.errPwd });
    setErr(null);
    onSubmit({ name: name.trim() || L.userName, email });
  };

  return (
    <Bg t={t} padTop={56} padBottom={40}>
      <Orbs dark={dark} />
      <div style={{ padding: '0 24px', position: 'relative' }}>
        <BackHeader t={t} onBack={onBack} />
        <h1 style={{
          fontSize: 28, fontWeight: 700, lineHeight: 1.15,
          margin: '8px 0 6px', letterSpacing: '-0.02em',
        }}>
          {isSignup ? L.signupWithEmail : L.loginWithEmail}
        </h1>
        <p style={{ fontSize: 13, color: t.textDim, margin: '0 0 24px' }}>
          {isSignup ? L.emailIntroSignup : L.emailIntroLogin}
        </p>

        {isSignup && (
          <AuthInput t={t} label={L.name} value={name} onChange={setName}
            placeholder={L.namePlaceholder} autoFocus
            error={err?.field === 'name' ? err.msg : null} />
        )}
        <AuthInput t={t} label={L.emailLbl} type="email" value={email} onChange={setEmail}
          placeholder={L.emailPlaceholder} autoFocus={!isSignup}
          error={err?.field === 'email' ? err.msg : null} />
        <AuthInput t={t} label={L.password} type="password" value={pwd} onChange={setPwd}
          placeholder={L.pwdPlaceholder}
          error={err?.field === 'pwd' ? err.msg : null} />

        {!isSignup && (
          <div style={{
            textAlign: lang === 'ar' ? 'left' : 'right', fontSize: 13, color: t.accent,
            margin: '-4px 0 18px', cursor: 'pointer', fontWeight: 600,
          }}>{L.forgotPwd}</div>
        )}

        <div style={{ marginTop: 8 }}>
          <PrimaryBtn t={t} onClick={submit} icon={<span>{arrow}</span>}>
            {isSignup ? L.createAccountBtn : L.loginBtn}
          </PrimaryBtn>
        </div>
      </div>
    </Bg>
  );
}

function CountryPicker({ t, value, onChange, onClose }) {
  const { L, lang } = useLang();
  const [query, setQuery] = useState('');
  const filtered = COUNTRIES.filter(c => {
    const q = query.trim().toLowerCase();
    if (!q) return true;
    return c.name.toLowerCase().includes(q)
        || (c.name_ar && c.name_ar.includes(query.trim()))
        || c.dial.includes(q.replace(/^\+/, ''))
        || c.code.toLowerCase().includes(q);
  });
  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 100,
      background: t.bg,
      display: 'flex', flexDirection: 'column',
      animation: 'screenIn 180ms ease-out',

        padding: '18px 20px 12px',
        borderBottom: `1px solid ${t.border}`,

        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          marginBottom: 14,
        }}>
          <div style={{ fontSize: 18, fontWeight: 700 }}>{L.selectCountry}</div>
          <div onClick={onClose} style={{
            width: 34, height: 34, borderRadius: 100,
            background: t.surface, border: `1px solid ${t.border}`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: t.textDim, cursor: 'pointer', fontSize: 16,
          }}>×</div>
        </div>
        <div style={{
          display: 'flex', alignItems: 'center',
          background: t.surface, border: `1px solid ${t.border}`,
          borderRadius: 12, padding: '0 12px',
        }}>
          <span style={{ color: t.textMute, marginRight: 8 }}>⌕</span>
          <input value={query} onChange={e => setQuery(e.target.value)}
            placeholder={L.searchCountry}
            autoFocus
            style={{
              flex: 1, padding: '10px 0', background: 'transparent', border: 0,
              outline: 'none', color: t.text, fontFamily: SANS, fontSize: 14,
            }} />
        </div>
      </div>

      <div style={{ flex: 1, overflow: 'auto', padding: '4px 8px 20px' }}>
        {filtered.length === 0 && (
          <div style={{
            padding: 24, textAlign: 'center',
            color: t.textDim, fontSize: 13,
          }}>{L.noMatches}</div>
        )}
        {filtered.map(c => {
          const selected = c.code === value.code;
          return (
            <div key={c.code}
              onClick={() => { onChange(c); onClose(); }}
              style={{
                display: 'flex', alignItems: 'center', gap: 12,
                padding: '12px 14px', margin: '2px 4px', borderRadius: 12,
                background: selected ? t.accentSoft : 'transparent',
                cursor: 'pointer',
              }}>
              <span style={{ fontSize: 22, lineHeight: 1 }}>{c.flag}</span>
              <span style={{ flex: 1, fontSize: 15, fontWeight: selected ? 700 : 500 }}>{cName(c, lang)}</span>
              <span style={{
                fontFamily: MONO, fontSize: 13,
                color: selected ? t.accent : t.textDim, fontWeight: 600,
              }}>{c.dial}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ScreenAuthPhone({ t, dark, mode, onBack, onSubmit }) {
  const { L, lang } = useLang();
  const isSignup = mode === 'signup';
  const arrow = lang === 'ar' ? '←' : '→';
  const [step, setStep] = useState('number'); // 'number' | 'otp'
  const [country, setCountry] = useState(COUNTRIES[0]);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [phone, setPhone] = useState('');
  const [code, setCode]   = useState(['', '', '', '', '', '']);
  const [err, setErr]     = useState(null);
  const [resendIn, setResendIn] = useState(0);
  const inputsRef = useRef([]);

  useEffect(() => {
    if (step !== 'otp' || resendIn <= 0) return;
    const id = setTimeout(() => setResendIn(s => s - 1), 1000);
    return () => clearTimeout(id);
  }, [step, resendIn]);

  const sendCode = () => {
    const digits = phone.replace(/\D/g, '');
    if (digits.length < 7) return setErr(L.errPhone);
    setErr(null);
    setStep('otp');
    setResendIn(30);
  };

  const setDigit = (i, v) => {
    const d = v.replace(/\D/g, '').slice(-1);
    setCode(c => {
      const next = [...c]; next[i] = d; return next;
    });
    if (d && i < 5) inputsRef.current[i + 1]?.focus();
  };

  const onKey = (i, e) => {
    if (e.key === 'Backspace' && !code[i] && i > 0) {
      inputsRef.current[i - 1]?.focus();
    }
  };

  const verify = () => {
    if (code.some(d => !d)) return setErr(L.errCode);
    setErr(null);
    onSubmit({ phone });
  };

  return (
    <Bg t={t} padTop={56} padBottom={40}>
      <Orbs dark={dark} />
      <div style={{ padding: '0 24px', position: 'relative' }}>
        <BackHeader t={t} onBack={step === 'otp' ? () => { setStep('number'); setErr(null); } : onBack} />

        {step === 'number' ? (
          <>
            <h1 style={{
              fontSize: 28, fontWeight: 700, lineHeight: 1.15,
              margin: '8px 0 6px', letterSpacing: '-0.02em',
            }}>
              {isSignup ? L.signupWithPhone : L.loginWithPhone}
            </h1>
            <p style={{ fontSize: 13, color: t.textDim, margin: '0 0 24px' }}>
              {L.phoneIntro}
            </p>

            <div style={{ marginBottom: 14 }}>
              <div style={{
                fontFamily: MONO, fontSize: 11, color: t.textDim,
                letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 8,
              }}>{L.phoneLbl}</div>
              <div style={{ display: 'flex', gap: 8 }}>
                <div onClick={() => setPickerOpen(true)} style={{
                  display: 'flex', alignItems: 'center', gap: 8,
                  padding: '0 14px', minWidth: 110,
                  background: t.surface, border: `1px solid ${t.border}`,
                  borderRadius: 14, cursor: 'pointer', userSelect: 'none',
                }}>
                  <span style={{ fontSize: 20, lineHeight: 1 }}>{country.flag}</span>
                  <span style={{ fontFamily: MONO, fontSize: 14, fontWeight: 600 }}>{country.dial}</span>
                  <span style={{ marginLeft: 'auto', color: t.textMute, fontSize: 12 }}>▾</span>
                </div>
                <div style={{
                  flex: 1, display: 'flex', alignItems: 'center',
                  background: t.surface, border: `1px solid ${err ? t.danger : t.border}`,
                  borderRadius: 14, padding: '0 14px',
                }}>
                  <input type="tel" value={phone} onChange={e => setPhone(e.target.value)}
                    placeholder={L.phonePlaceholder} autoFocus inputMode="tel" dir="ltr"
                    style={{
                      flex: 1, padding: '14px 0', background: 'transparent', border: 0,
                      outline: 'none', color: t.text, fontFamily: SANS, fontSize: 15,
                    }} />
                </div>
              </div>
              {err && <div style={{ marginTop: 6, color: t.danger, fontSize: 12 }}>{err}</div>}
            </div>

            <div style={{ marginTop: 12 }}>
              <PrimaryBtn t={t} onClick={sendCode} icon={<span>{arrow}</span>}>
                {L.sendCode}
              </PrimaryBtn>
            </div>
          </>
        ) : (
          <>
            <h1 style={{
              fontSize: 28, fontWeight: 700, lineHeight: 1.15,
              margin: '8px 0 6px', letterSpacing: '-0.02em',
            }}>{L.enterCode}</h1>
            <p style={{ fontSize: 13, color: t.textDim, margin: '0 0 28px' }}>
              {L.codeSentTo} <span style={{ color: t.text, fontWeight: 600 }} dir="ltr">{country.dial} {phone}</span>
            </p>

            <div style={{
              display: 'flex', gap: 8, justifyContent: 'space-between', marginBottom: 14,
            }}>
              {code.map((d, i) => (
                <input key={i}
                  ref={el => inputsRef.current[i] = el}
                  value={d}
                  onChange={e => setDigit(i, e.target.value)}
                  onKeyDown={e => onKey(i, e)}
                  inputMode="numeric"
                  maxLength={1}
                  autoFocus={i === 0}
                  style={{
                    width: 46, height: 56, textAlign: 'center',
                    background: t.surface, border: `1px solid ${err ? t.danger : (d ? t.accent : t.border)}`,
                    borderRadius: 14, color: t.text,
                    fontFamily: MONO, fontWeight: 700, fontSize: 22,
                    outline: 'none',
                  }} />
              ))}
            </div>
            {err && <div style={{ color: t.danger, fontSize: 12, marginBottom: 12 }}>{err}</div>}

            <div style={{
              fontSize: 13, color: t.textDim, marginBottom: 18,
            }}>
              {L.didntGet}{' '}
              {resendIn > 0
                ? <span style={{ color: t.textMute, fontFamily: MONO }}>{L.resendIn} {resendIn}s</span>
                : <span onClick={() => setResendIn(30)} style={{ color: t.accent, cursor: 'pointer', fontWeight: 600 }}>{L.resendCode}</span>}
            </div>

            <PrimaryBtn t={t} onClick={verify} icon={<span>{arrow}</span>}>
              {isSignup ? L.createAccountBtn : L.loginBtn}
            </PrimaryBtn>
          </>
        )}
      </div>
      {pickerOpen && (
        <CountryPicker t={t} value={country}
          onChange={setCountry}
          onClose={() => setPickerOpen(false)} />
      )}
    </Bg>
  );
}

function ScreenLobby({ t, dark, code, opponentName, category, difficulty, onBack, onStart }) {
  const { L, lang } = useLang();
  const [opponentReady, setOpponentReady] = useState(false);
  const [copied, setCopied] = useState(false);
  useEffect(() => {
    const id = setTimeout(() => setOpponentReady(true), 2400);
    return () => clearTimeout(id);
  }, []);
  const cat = CATEGORIES.find(c => c.id === category);
  const diff = DIFFICULTIES.find(d => d.id === difficulty);
  const copy = () => {
    try { navigator.clipboard?.writeText(code); } catch {}
    setCopied(true); setTimeout(() => setCopied(false), 1500);
  };
  return (
    <Bg t={t} padTop={56}>
      <Orbs dark={dark} />
      <div style={{ padding: '0 20px', position: 'relative' }}>
        <BackHeader t={t} onBack={onBack} />
        <div style={{ textAlign: 'center', marginTop: 4 }}>
          <Pill t={t} tone="accent">{L.liveDot} {opponentReady ? L.oppReady : L.waitingP2}</Pill>
          <h1 style={{ fontSize: 28, fontWeight: 700, margin: '14px 0 6px', letterSpacing: '-0.02em' }}>
            {L.shareCode}
          </h1>
          <p style={{ fontSize: 14, color: t.textDim, margin: 0 }}>
            {L.shareCodeSub}
          </p>
        </div>

        <div style={{
          display: 'flex', justifyContent: 'center', gap: 8,
          margin: '28px 0 18px',
        }}>
          {code.split('').map((ch, i) => (
            <div key={i} style={{
              width: 44, height: 56, borderRadius: 14,
              background: t.surface, border: `1px solid ${t.border}`,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: MONO, fontSize: 26, fontWeight: 700, color: t.accent,
              boxShadow: dark ? 'inset 0 0 0 1px rgba(77,123,255,0.18)' : 'none',
            }}>{ch}</div>
          ))}
        </div>

        <div style={{
          display: 'flex', justifyContent: 'center', gap: 10, marginBottom: 22,
        }}>
          <GhostBtn t={t} onClick={copy}>{copied ? L.copied : L.copy}</GhostBtn>
          <GhostBtn t={t} onClick={copy}>{L.shareLink}</GhostBtn>
        </div>

        <Card t={t} style={{ padding: 0, overflow: 'hidden' }}>
          <PlayerRow t={t} name={`${L.userName}${L.youSuffix}`} sub={L.ready} rank="#142" you />
          <div style={{ height: 1, background: t.border }} />
          {opponentReady
            ? <PlayerRow t={t} name={opponentName || (lang === 'ar' ? 'عمر' : 'Omar')} sub={L.ready} rank="#218" />
            : <PlayerRow t={t} name={L.waitingDots} sub={L.player2} pending />
          }
        </Card>

        <div style={{ marginTop: 16 }}>
          <SectionTitle t={t}>{L.match}</SectionTitle>
        </div>
        <Card t={t} style={{ marginTop: 10 }}>
          <Setting t={t} label={L.mode} value={L.modeH2H} />
          <Setting t={t} label={L.category} value={cat ? catLabel(cat, lang) : L.random} />
          <Setting t={t} label={L.difficulty} value={`${diffLabel(diff, lang)} · ${diff.mult}${L.scoreMult}`} />
          <Setting t={t} label={L.timer} value={`${TIMER_SECONDS}${L.perQuestion}`} />
          <Setting t={t} label={L.questions} value={QUESTIONS_PER_MATCH} last />
        </Card>

        <div style={{ marginTop: 22 }}>
          <PrimaryBtn t={t} onClick={onStart} disabled={!opponentReady} icon={<span>▶</span>}>

function TimerRing({ t, sec, total }) {
  const { L } = useLang();
  const pct = sec / total;
  const r = 48;
  const c = 2 * Math.PI * r;
  const dash = c * pct;
  const color = sec <= 5 ? t.danger : sec <= 8 ? t.warn : t.accent;
  return (
    <div style={{ position: 'relative', width: 120, height: 120 }}>
      <svg width="120" height="120" style={{ transform: 'rotate(-90deg)' }}>
        <circle cx="60" cy="60" r={r} stroke={t.border} strokeWidth="6" fill="none" />
        <circle cx="60" cy="60" r={r} stroke={color} strokeWidth="6" fill="none"
          strokeDasharray={`${dash} ${c}`} strokeLinecap="round"
          style={{ filter: `drop-shadow(0 0 12px ${color}88)`, transition: 'stroke-dasharray 800ms linear, stroke 200ms' }}
        />
      </svg>
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{ fontSize: 32, fontWeight: 700, fontFamily: MONO, color, lineHeight: 1 }}>
          {sec.toString().padStart(2, '0')}
        </div>
        <div style={{ fontSize: 10, color: t.textDim, fontFamily: MONO, marginTop: 2 }}>{L.secondsLbl}</div>
      </div>
    </div>
  );
}

function Option({ t, letter, text, selected, correct, wrong, locked, onClick }) {
  let bg = t.surface, border = t.border, glow = 'none', textColor = t.text;
  let letterBg = t.surfaceStrong, letterColor = t.accent;
  if (selected && !correct && !wrong) { bg = t.accentSoft; border = t.accent; glow = t.accentGlow; letterBg = t.accent; letterColor = '#fff'; }
  if (correct)                        { bg = 'rgba(74,222,128,0.14)'; border = t.success; letterBg = t.success; letterColor = '#fff'; }
  if (wrong)                          { bg = 'rgba(255,107,107,0.14)'; border = t.danger;  letterBg = t.danger;  letterColor = '#fff'; }
  return (
    <div onClick={locked ? undefined : onClick} style={{
      padding: '14px 14px', borderRadius: 16,
      background: bg, border: `1.5px solid ${border}`,
      boxShadow: glow,
      display: 'flex', alignItems: 'center', gap: 12,
      cursor: locked ? 'default' : 'pointer',
      transition: 'background 160ms, border 160ms, box-shadow 160ms',
    }}>
      <div style={{
        width: 32, height: 32, borderRadius: 10,
        background: letterBg, color: letterColor,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: MONO, fontWeight: 700, fontSize: 14,
        border: selected || correct || wrong ? 'none' : `1px solid ${t.border}`,
      }}>{letter}</div>
      <div style={{ fontSize: 15, fontWeight: 500, color: textColor, flex: 1 }}>{text}</div>
      {correct && <span style={{ color: t.success, fontSize: 18 }}>✓</span>}
      {wrong   && <span style={{ color: t.danger,  fontSize: 18 }}>✗</span>}
    </div>
  );
}

function BigChoice({ t, label, sub, tone, selected, correct, wrong, onClick, locked }) {
  const c = tone === 'success' ? t.success : t.danger;
  const isAnswered = correct || wrong;
  return (
    <div onClick={locked ? undefined : onClick} style={{
      aspectRatio: '1 / 1', borderRadius: 22,
      background: correct ? `${t.success}26` : wrong ? `${t.danger}26` : selected ? `${c}22` : t.surface,
      border: `2px solid ${correct ? t.success : wrong ? t.danger : selected ? c : t.border}`,
      boxShadow: (selected || isAnswered) ? `0 0 30px ${(correct ? t.success : wrong ? t.danger : c)}55` : 'none',
      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
      gap: 6, cursor: locked ? 'default' : 'pointer',

function TimerBar({ t, sec, total }) {
  const color = sec <= 5 ? t.danger : sec <= 8 ? t.warn : t.accent;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
      <span style={{ fontFamily: MONO, fontSize: 13, fontWeight: 700, color }}>{sec.toString().padStart(2,'0')}s</span>
      <div style={{ width: 80, height: 6, borderRadius: 100, background: t.border, overflow: 'hidden' }}>
        <div style={{
          width: `${(sec / total) * 100}%`, height: '100%', background: color,
          boxShadow: `0 0 10px ${color}`, transition: 'width 800ms linear, background 200ms',
        }} />
      </div>
    </div>
  );
}

// ───────────────────────── 9. RESULTS ─────────────────────────
function ScreenResults({ t, dark, mode, yourScore, oppScore, oppName, correct, total, avgTime, streak, onBack, onRematch, onHome }) {
  const { L, lang } = useLang();
  const won = mode === 'team' ? yourScore > oppScore : (correct >= Math.ceil(total/2));
  const tied = mode === 'team' && yourScore === oppScore;
  const margin = Math.abs(yourScore - oppScore);
  const symbol = mode === 'team' ? (won ? 'W' : tied ? 'T' : 'L') : (correct === total ? '★' : '✓');
  const headline = mode === 'team'
    ? (won ? L.youWon : tied ? L.tie : L.lostClose)
    : (correct === total ? L.flawless : `${correct}/${total} ${L.correctOf}`);
  const sub = mode === 'team'
    ? (tied ? L.evenMatchup : `${L.by} ${margin} ${L.points}. ${won ? L.brutal : L.rematch}`)
    : `${L.niceRun} +${yourScore} ${L.pts}`;
  return (
    <Bg t={t} padTop={56}>
      <Orbs dark={dark} />
      <div style={{ padding: '0 20px', position: 'relative', textAlign: 'center' }}>
        <div style={{ textAlign: 'left' }}>
          <BackHeader t={t} onBack={onBack} />
        </div>
        <div style={{
          fontFamily: MONO, fontSize: 11, color: t.textDim,
          letterSpacing: '0.15em', marginTop: 8,
        }}>{L.matchComplete}</div>

        <div style={{
          margin: '14px 0 6px',
          fontFamily: MONO, fontWeight: 700,
          fontSize: 90, color: t.accent, lineHeight: 1,
          textShadow: dark ? '0 0 50px rgba(77,123,255,0.55)' : 'none',
          letterSpacing: '-0.04em',
        }}>
          {'{'}<span style={{ color: t.text }}>{symbol}</span>{'}'}
        </div>

        <h1 style={{ fontSize: 32, fontWeight: 700, margin: '6px 0 4px', letterSpacing: '-0.02em' }}>
          {headline}
        </h1>
        <p style={{ fontSize: 14, color: t.textDim, margin: '0 0 22px' }}>{sub}</p>

        {mode === 'team' && (
          <Card t={t} style={{ padding: 16 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{
                  width: 44, height: 44, borderRadius: 100,
                  background: `linear-gradient(135deg, ${t.accent} 0%, #8C5AFF 100%)`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  color: '#fff', fontWeight: 700,
                }}>L</div>
                <div style={{ textAlign: 'left' }}>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>{L.userName}{L.youSuffix}</div>
                  <Pill t={t} tone={won ? 'success' : tied ? 'default' : 'danger'}>
                    {won ? `+${margin}` : tied ? '— —' : `-${margin}`}
                  </Pill>
                </div>
              </div>
              <div style={{ fontSize: 28, fontWeight: 700, fontFamily: MONO, color: won ? t.accent : t.text }}>{yourScore}</div>
            </div>
            <div style={{ height: 1, background: t.border, margin: '14px 0' }} />
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <div style={{
                  width: 44, height: 44, borderRadius: 100,
                  background: 'linear-gradient(135deg, #FF6B6B 0%, #FFB454 100%)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  color: '#fff', fontWeight: 700,
                }}>{oppName[0]}</div>
                <div style={{ textAlign: 'left' }}>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>{oppName}</div>
                  <div style={{ fontSize: 12, color: t.textDim, fontFamily: MONO }}>{won ? L.niceTry : L.gg}</div>
                </div>
              </div>
              <div style={{ fontSize: 28, fontWeight: 700, fontFamily: MONO, color: won ? t.textDim : t.text }}>{oppScore}</div>
            </div>
          </Card>
        )}

        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginTop: 16,
        }}>
          <Stat t={t} label={L.correctLbl} value={`${correct}/${total}`} />
          <Stat t={t} label={L.avgTimeLbl} value={mode === 'team' ? `${avgTime.toFixed(1)}s` : '—'} />
          <Stat t={t} label={L.streakLbl} value={streak} />
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginTop: 22 }}>
          <PrimaryBtn t={t} onClick={onRematch} icon={<span>↻</span>}>{L.rematchBtn}</PrimaryBtn>
          <GhostBtn t={t} full onClick={onHome}>{L.backToHome}</GhostBtn>
        </div>
      </div>
    </Bg>
  );
}

// ───────────────────────── Match logic ─────────────────────────
// Async question loader: routes to OTDB (English) or Arabic JSON bank.
// For "random mix" English, fetch one batch per category in parallel.
async function buildQuestions(category, difficulty, count, lang) {
  if (lang === 'ar') return fetchArabic(category, difficulty, count);
  if (category)     return fetchEnglish(category, difficulty, count);
  const cats = Object.keys(OTDB_CAT);
  const perCat = Math.max(1, Math.ceil(count / cats.length));
  const lists = await Promise.all(cats.map(c =>
    fetchEnglish(c, difficulty, perCat).then(qs => qs.map(q => ({ ...q, _cat: c })))
  ));
  return shuffle(lists.flat()).slice(0, count);
}

function tieredPoints(secLeft) {
  // 15s timer; full points if sec >= 10, 75% if 5-9, 50% if 1-4, 0 if 0
  if (secLeft >= 10) return 1.0;
  if (secLeft >= 5)  return 0.75;
  if (secLeft >= 1)  return 0.5;
  return 0;
}

function genRoomCode() {
  const A = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  let s = '';
  for (let i = 0; i < 6; i++) s += A[Math.floor(Math.random() * A.length)];
  return s;
}

// ───────────────────────── App ─────────────────────────
function App() {
  const [store, updateStore] = useStore();
  const dark = store.darkMode;
  const t = dark ? TOKENS.dark : TOKENS.light;
  const lang = store.lang || 'en';
  const L = STRINGS[lang] || STRINGS.en;
  const isRTL = lang === 'ar';
  const toggleLang = () => updateStore({ lang: lang === 'ar' ? 'en' : 'ar' });

  // navigation: which top-level screen + history stack for back button
  const [screen, setScreen] = useState('onboarding'); // onboarding | auth | authEmail | authPhone | home | invite | categories | difficulty | lobby | loading | question | results | leaderboard | profile | settings
  const [history, setHistory] = useState([]);
  const [authMode, setAuthMode] = useState('signup'); // 'signup' | 'login'

  const navigate = useCallback((next, opts = {}) => {
    setHistory(h => opts.replace ? h : [...h, screen]);
    setScreen(next);
  }, [screen]);

  const back = useCallback(() => {
    setHistory(h => {
      if (h.length === 0) return h;
      const prev = h[h.length - 1];
      setScreen(prev);
      return h.slice(0, -1);
    });
  }, []);

  const canBack = history.length > 0;

  // match config
  const [mode, setMode] = useState('team'); // 'solo' | 'team'
  const [category, setCategory] = useState(null);
  const [difficulty, setDifficulty] = useState('mid');
  const [roomCode, setRoomCode] = useState(genRoomCode());
  const [opponentName, setOpponentName] = useState('Omar');

  // match state
  const [questions, setQuestions] = useState([]);
  const [qIdx, setQIdx] = useState(0);
  const [yourScore, setYourScore] = useState(0);
  const [oppScore, setOppScore] = useState(0);
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [oppPickIdx, setOppPickIdx] = useState(null);
  const [secLeft, setSecLeft] = useState(TIMER_SECONDS);
  const [yourTimes, setYourTimes] = useState([]);
  const [yourCorrect, setYourCorrect] = useState(0);
  const advanceTimer = useRef(null);
  const tickTimer = useRef(null);

  const toggleTheme = () => updateStore({ darkMode: !dark });

  // ─── timer ─────────────────────────────────────────
  useEffect(() => {
    if (screen !== 'question' || mode !== 'team' || revealed || selected != null) return;
    if (secLeft <= 0) { onTimerExpired(); return; }
    tickTimer.current = setTimeout(() => setSecLeft(s => s - 1), 1000);
    return () => clearTimeout(tickTimer.current);
  }, [screen, mode, secLeft, revealed, selected]);

  // ─── opponent simulation ─────────────────────────
  // schedule a simulated opponent answer once a question loads
  const oppPickedAtRef = useRef(null);
  useEffect(() => {
    if (screen !== 'question' || mode !== 'team') return;
    oppPickedAtRef.current = null;
    setOppPickIdx(null);
    const q = questions[qIdx];
    if (!q) return;
    // probability opponent gets it right by difficulty
    const accByDiff = { easy: 0.85, mid: 0.65, hard: 0.45 };
    const acc = accByDiff[difficulty] ?? 0.6;
    const optsLen = q.type === 'tf' ? 2 : q.opts.length;
    const correctIdx = q.a;
    const oppCorrect = Math.random() < acc;
    const pick = oppCorrect ? correctIdx : (Math.floor(Math.random() * (optsLen - 1)) + correctIdx + 1) % optsLen;
    // when does opponent answer? somewhere between 3s and 13s
    const delay = 3000 + Math.random() * 10000;
    const id = setTimeout(() => {
      const remainingSec = Math.max(0, TIMER_SECONDS - Math.round(delay / 1000));
      oppPickedAtRef.current = { pick, remainingSec, correct: oppCorrect };
    }, delay);
    return () => clearTimeout(id);
  }, [screen, mode, qIdx, questions, difficulty]);

  // ─── pick answer (team) ────────────────────────
  const pickTeam = (idx) => {
    if (revealed || selected != null) return;
    setSelected(idx);
    const q = questions[qIdx];
    const isRight = idx === q.a;
    const usedSec = TIMER_SECONDS - secLeft;
    setYourTimes(ts => [...ts, usedSec]);
    if (isRight) setYourCorrect(c => c + 1);
    // tiered scoring
    const diff = DIFFICULTIES.find(d => d.id === difficulty);
    const tier = tieredPoints(secLeft);
    const earned = isRight ? Math.round(100 * diff.mult * tier) : 0;
    setYourScore(s => s + earned);
    // resolve opponent
    const oppRes = oppPickedAtRef.current;
    let oppPick, oppRem, oppCorrect;
    if (oppRes) {
      oppPick = oppRes.pick; oppRem = oppRes.remainingSec; oppCorrect = oppRes.correct;
    } else {
      // opponent hasn't answered yet — assume they answer right after, slower
      const accByDiff = { easy: 0.85, mid: 0.65, hard: 0.45 };
      oppCorrect = Math.random() < (accByDiff[difficulty] ?? 0.6);
      const optsLen = q.type === 'tf' ? 2 : q.opts.length;
      oppPick = oppCorrect ? q.a : (Math.floor(Math.random() * (optsLen - 1)) + q.a + 1) % optsLen;
      oppRem = Math.max(0, secLeft - 1 - Math.floor(Math.random() * 4));
    }
    const oppEarned = oppCorrect ? Math.round(100 * diff.mult * tieredPoints(oppRem)) : 0;
    setOppScore(s => s + oppEarned);
    setOppPickIdx(oppPick);
    setRevealed(true);
    advanceTimer.current = setTimeout(advanceTeam, 2000);
  };

  const onTimerExpired = () => {
    if (revealed || selected != null) return;
    setYourTimes(ts => [...ts, TIMER_SECONDS]);
    // resolve opponent: maybe they answered, maybe not
    const oppRes = oppPickedAtRef.current;
    let oppPick = null, oppEarned = 0, oppCorrect = false;
    const q = questions[qIdx];
    const diff = DIFFICULTIES.find(d => d.id === difficulty);
    if (oppRes) {
      oppPick = oppRes.pick; oppCorrect = oppRes.correct;
      oppEarned = oppCorrect ? Math.round(100 * diff.mult * tieredPoints(oppRes.remainingSec)) : 0;
    }
    setOppScore(s => s + oppEarned);
    setOppPickIdx(oppPick);
    setSelected(-1); // marker for "didn't answer"
    setRevealed(true);
    advanceTimer.current = setTimeout(advanceTeam, 2000);
  };

  const advanceTeam = () => {
    if (qIdx + 1 >= questions.length) {
      finishMatch();
    } else {
      setQIdx(qIdx + 1);
      setSelected(null);
      setRevealed(false);
      setOppPickIdx(null);
      setSecLeft(TIMER_SECONDS);
    }
  };

  // ─── pick answer (solo) ────────────────────────
  const pickSolo = (idx) => {
    if (revealed || selected != null) return;
    setSelected(idx);
    const q = questions[qIdx];
    const isRight = idx === q.a;
    if (isRight) {
      setYourScore(s => s + 100);
      setYourCorrect(c => c + 1);
    }
    setRevealed(true);
  };

  const advanceSolo = () => {
    if (qIdx + 1 >= questions.length) {
      finishMatch();
    } else {
      setQIdx(qIdx + 1);
      setSelected(null);
      setRevealed(false);
    }
  };

  const finishMatch = () => {
    clearTimeout(advanceTimer.current);
    clearTimeout(tickTimer.current);
    // update store
    const won = mode === 'team' ? yourScore > oppScore : yourCorrect >= Math.ceil(questions.length/2);
    updateStore(prev => {
      const lastKey = prev.lastPlayed;
      const today = todayKey();
      let newStreak = prev.streak;
      if (lastKey !== today) newStreak = (lastKey ? prev.streak : prev.streak) + 1;
      const masteryDelta = Math.round((yourCorrect / questions.length) * (DIFFICULTIES.find(d=>d.id===difficulty).mult * 4));
      const nextMastery = { ...(prev.mastery || {}) };
      if (category) {
        nextMastery[category] = Math.max(0, Math.min(100, (nextMastery[category] ?? 0) + masteryDelta - 2));
      }
      return {
        ...prev,
        streak: newStreak,
        lastPlayed: today,
        wins: prev.wins + (won ? 1 : 0),
        played: prev.played + 1,
        correctTotal: prev.correctTotal + yourCorrect,
        totalAnswered: prev.totalAnswered + questions.length,
        bestScore: Math.max(prev.bestScore, yourScore),
        mastery: nextMastery,
      };
    });
    navigate('results');
  };

  // ─── flow handlers ─────────────────────────────
  const [loadError, setLoadError] = useState(null);
  const startMatch = async () => {
    setLoadError(null);
    setQuestions([]);
    setQIdx(0);
    setYourScore(0); setOppScore(0);
    setYourTimes([]); setYourCorrect(0);
    setSelected(null); setRevealed(false); setOppPickIdx(null);
    setSecLeft(TIMER_SECONDS);
    navigate('loading');
    try {
      const qs = await buildQuestions(category, difficulty, QUESTIONS_PER_MATCH, lang);
      if (!qs || qs.length === 0) throw new Error('empty');
      setQuestions(qs);
      navigate('question', { replace: true });
    } catch (e) {
      console.error('Failed to load questions:', e);
      setLoadError(e.message || 'load_failed');
    }
  };

  const onPickMode = (m) => {
    setMode(m);
    setCategory(null);
    navigate('categories');
  };

  const onNav = (id) => {
    if (id === 'home')     navigate('home');
    if (id === 'board')    navigate('leaderboard');
    if (id === 'me')       navigate('profile');
    if (id === 'settings') navigate('settings');
  };

  const onToggleNotifications = (v) => updateStore({ notifications: v });

  const onLogout = () => {
    setHistory([]);
    setScreen('onboarding');
  };

  const onDeleteAccount = () => {
    try { localStorage.removeItem(STORAGE_KEY); } catch {}
    updateStore({
      streak: 0, lastPlayed: null, wins: 0, played: 0,
      correctTotal: 0, totalAnswered: 0, bestScore: 0,
      mastery: { movies: 0, history: 0, landmarks: 0, sports: 0, music: 0, science: 0 },
      notifications: false,
    });
    setHistory([]);
    setScreen('onboarding');
  };

  // cleanup timers on screen change
  useEffect(() => () => {
    clearTimeout(advanceTimer.current);
    clearTimeout(tickTimer.current);
  }, []);

  // ─── render ────────────────────────────────────
  const q = questions[qIdx];
  const avgTime = yourTimes.length ? yourTimes.reduce((a,b)=>a+b,0)/yourTimes.length : 0;

  // helper: only expose onBack when there's history
  const ob = canBack ? back : undefined;

  let body;
  if (screen === 'onboarding') {
    body = <ScreenOnboarding t={t} dark={dark} onStart={(m) => {
      setAuthMode(m || 'signup');
      navigate('auth');
    }} />;
  } else if (screen === 'auth') {
    body = <ScreenAuth t={t} dark={dark}
      mode={authMode}
      setMode={setAuthMode}
      onBack={ob}
      onPick={(provider) => {
        if (provider === 'email') navigate('authEmail');
        else if (provider === 'phone') navigate('authPhone');
        else navigate('home', { replace: true }); // apple / google → mock success
      }}
    />;
  } else if (screen === 'authEmail') {
    body = <ScreenAuthEmail t={t} dark={dark}
      mode={authMode}
      onBack={ob}
      onSubmit={() => navigate('home', { replace: true })}
    />;
  } else if (screen === 'authPhone') {
    body = <ScreenAuthPhone t={t} dark={dark}
      mode={authMode}
      onBack={ob}
      onSubmit={() => navigate('home', { replace: true })}
    />;
  } else if (screen === 'home') {
    body = <ScreenHome t={t} dark={dark} store={store}
      onPickMode={onPickMode}
      onNav={onNav}
      onToggleTheme={toggleTheme}
    />;
  } else if (screen === 'categories') {
    body = <ScreenCategories t={t} dark={dark}
      selected={category}
      onPick={(id, advance) => { setCategory(id); if (advance) navigate('difficulty'); }}
      onBack={ob}
      onRandom={() => { setCategory(null); navigate('difficulty'); }}
    />;
  } else if (screen === 'difficulty') {
    body = <ScreenDifficulty t={t} dark={dark}
      selected={difficulty}
      onPick={setDifficulty}
      onBack={ob}
      onContinue={() => {
        if (mode === 'solo') startMatch();
        else navigate('invite');
      }}
    />;
  } else if (screen === 'invite') {
    body = <ScreenInvite t={t} dark={dark}
      onBack={ob}
      onCreate={(name) => {
        if (name) setOpponentName(name);
        setRoomCode(genRoomCode());
        navigate('lobby');
      }}
      onJoin={(code) => {
        setRoomCode(code);
        setOpponentName('Omar');
        navigate('lobby');
      }}
    />;
  } else if (screen === 'lobby') {
    body = <ScreenLobby t={t} dark={dark}
      code={roomCode}
      opponentName={opponentName}
      category={category}
      difficulty={difficulty}
      onBack={ob}
      onStart={startMatch}
    />;
  } else if (screen === 'loading') {
    body = <ScreenLoading t={t} dark={dark}
      error={loadError}
      onRetry={() => startMatch()}
      onBack={() => { setLoadError(null); back(); }}
    />;
  } else if (screen === 'question' && q) {
    if (mode === 'team') {
      body = <ScreenQuestionTeam t={t} dark={dark}
        q={q}
        qIdx={qIdx}
        total={questions.length}
        category={q._cat || category}
        difficulty={difficulty}
        yourScore={yourScore}
        oppScore={oppScore}
        oppName={opponentName}
        selected={selected}
        revealed={revealed}
        correctIdx={q.a}
        oppPickIdx={oppPickIdx}
        secLeft={secLeft}
        onBack={ob}
        onPick={pickTeam}
      />;
    } else {
      body = <ScreenQuestionSolo t={t} dark={dark}
        q={q}
        qIdx={qIdx}
        total={questions.length}
        category={q._cat || category}
        difficulty={difficulty}
        selected={selected}
        revealed={revealed}
        correctIdx={q.a}
        onBack={ob}
        onPick={pickSolo}
        onNext={advanceSolo}
      />;
    }
  } else if (screen === 'results') {
    body = <ScreenResults t={t} dark={dark}
      mode={mode}
      yourScore={yourScore}
      oppScore={oppScore}
      oppName={opponentName}
      correct={yourCorrect}
      total={questions.length || QUESTIONS_PER_MATCH}
      avgTime={avgTime}
      streak={store.streak}
      onBack={ob}
      onRematch={startMatch}
      onHome={() => navigate('home')}
    />;
  } else if (screen === 'leaderboard') {
    body = <ScreenLeaderboard t={t} dark={dark} store={store} onNav={onNav} />;
  } else if (screen === 'profile') {
    body = <ScreenProfile t={t} dark={dark} store={store} onNav={onNav} onToggleTheme={toggleTheme} />;
  } else if (screen === 'settings') {
    body = <ScreenSettings t={t} dark={dark} store={store}
      onNav={onNav}
      onToggleTheme={toggleTheme}
      onToggleLang={toggleLang}
      onToggleNotifications={onToggleNotifications}
      onLogout={onLogout}
      onDeleteAccount={onDeleteAccount}
    />;
  } else {
    body = <ScreenHome t={t} dark={dark} store={store} onPickMode={onPickMode} onNav={onNav} onToggleTheme={toggleTheme} />;
  }

  // Map current screen → which nav tab is active (null = no nav bar)
  const navMap = { home: 'home', leaderboard: 'board', profile: 'me', settings: 'settings' };
  const navActive = navMap[screen] || null;

  return (
    <LangCtx.Provider value={{ L, lang, toggleLang }}>
      <div className="phone" dir={isRTL ? 'rtl' : 'ltr'} style={{
        background: t.bg, color: t.text,
        fontFamily: isRTL
          ? '"Noto Naskh Arabic", "SF Arabic", "Geeza Pro", "Tahoma", sans-serif'
          : SANS,
      }}>
        <div className="screen" key={screen + ':' + qIdx + ':' + lang} style={{ height: '100%' }}>
          {body}
        </div>
        {navActive && <BottomNav t={t} active={navActive} onNav={onNav} />}
      </div>
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
